<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Saved Activities | What Should My Kid Do?</title>
<meta name="robots" content="noindex"/>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-PR9HN2R2NQ"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-PR9HN2R2NQ');</script>
<style>
*,*::before,*::after{box-sizing:border-box}
body{margin:0;padding:0 0 80px;font-family:'DM Sans',system-ui,sans-serif;background:#FAFAF5;color:#1A2E1A}
.header{background:#fff;border-bottom:1.5px solid #E2E8E0;position:sticky;top:0;z-index:100}
.header-inner{max-width:700px;margin:0 auto;padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:52px}
.logo{display:flex;align-items:center;gap:7px;font-family:'Montserrat',sans-serif;font-weight:900;font-size:14px;color:#1A2E1A;text-decoration:none}
.cta-btn{background:#2D6A4F;color:#fff;border:none;border-radius:50px;padding:9px 20px;font-family:'Montserrat',sans-serif;font-weight:800;font-size:13px;cursor:pointer;text-decoration:none}
.card{background:#fff;border-radius:14px;border:1.5px solid #E2E8E0;padding:16px 18px;display:flex;align-items:center;justify-content:space-between;gap:12px;text-decoration:none;color:#1A2E1A;margin-bottom:10px;transition:all .15s}
.card:hover{border-color:#2D6A4F}
</style>
</head>
<body>
<header class="header">
  <div class="header-inner">
    <a href="/" class="logo"><span>🎨</span>what should my kid do?</a>
    <a href="/activities" style="font-family:'Montserrat',sans-serif;font-weight:700;font-size:13px;color:#4A5568;text-decoration:none">← All activities</a>
  </div>
</header>

<div style="max-width:700px;margin:0 auto;padding:32px 20px">
  <h1 style="font-family:'Montserrat',sans-serif;font-size:28px;font-weight:900;color:#1A2E1A;margin:0 0 4px">❤️ Saved Activities</h1>
  <p style="font-size:14px;color:#718096;margin:0 0 28px">Activities you saved for later. Tap one to read the full steps.</p>
  
  <div id="saved-list"></div>
  
  <div id="empty-state" style="display:none;text-align:center;padding:48px 20px">
    <div style="font-size:48px;margin-bottom:16px">🤍</div>
    <div style="font-family:'Montserrat',sans-serif;font-weight:800;font-size:18px;color:#1A2E1A;margin-bottom:8px">Nothing saved yet</div>
    <p style="font-size:14px;color:#718096;margin:0 0 20px">When you find an activity you like, tap the 🤍 Save button to keep it here.</p>
    <a href="/activities" class="cta-btn">Browse activities</a>
  </div>
  <!-- Tag insights based on saved activities -->
  <div id="tag-insights" style="margin-top:24px"></div>

</div>

<nav style="position:fixed;bottom:0;left:0;right:0;z-index:200;background:#fff;border-top:1.5px solid #E2E8E0;box-shadow:0 -2px 12px rgba(0,0,0,.08);display:flex;padding-bottom:env(safe-area-inset-bottom)">
  <a href="/activities" style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;text-decoration:none;font-family:'Montserrat',sans-serif;font-weight:700;font-size:10px;padding:8px 4px;color:#718096"><span style="font-size:20px">⚡</span>Activities</a>
  <a href="/saved" style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;text-decoration:none;font-family:'Montserrat',sans-serif;font-weight:700;font-size:10px;padding:8px 4px;color:#2D6A4F"><span style="font-size:20px">❤️</span>Saved</a>
  <a href="https://www.whatgiftshouldibuy.com" style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;text-decoration:none;font-family:'Montserrat',sans-serif;font-weight:700;font-size:10px;padding:8px 4px;color:#718096"><span style="font-size:20px">🎁</span>Gifts</a>
  <a href="/" style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;text-decoration:none;font-family:'Montserrat',sans-serif;font-weight:700;font-size:10px;padding:8px 4px;color:#718096"><span style="font-size:20px">🛠️</span>Build</a>
</nav>

<script src="/js/activities-data.js"></script>
<script>
var saved = JSON.parse(localStorage.getItem('savedActivities') || '[]');
var list = document.getElementById('saved-list');
var empty = document.getElementById('empty-state');

if (saved.length === 0) {
  empty.style.display = 'block';
} else {
  saved.forEach(function(a) {
    var card = document.createElement('a');
    card.href = '/' + a.slug;
    card.className = 'card';
    card.innerHTML = '<div style="font-family:\'Montserrat\',sans-serif;font-weight:800;font-size:15px">' + a.title + '</div>' +
      '<button onclick="event.preventDefault();removeSaved(\'' + a.slug + '\')" style="background:none;border:none;font-size:18px;cursor:pointer;color:#E53E3E;flex-shrink:0" title="Remove">✕</button>';
    list.appendChild(card);
  });
}

// Show tag profile — what this parent tends to like
setTimeout(function() {
  var profile = window.getLikedTagProfile ? window.getLikedTagProfile() : {};
  var keys = Object.keys(profile).sort(function(a,b){ return profile[b]-profile[a]; });
  if (keys.length < 2) return;
  var readableTag = {
    'tired-parents':'tired parent activities','no-mess':'no-mess activities',
    'physical':'physical activities','competitive':'competitive games',
    'under-15-min':'quick activities','high-energy':'high energy',
    'outdoor':'outdoor activities','art':'art and creative','math':'math games',
    'science':'science activities','language':'language and literacy',
    'zero-effort':'zero effort setup','calm':'calm activities',
    'stem':'STEM activities','indoor':'indoor activities'
  };
  var top = keys.slice(0,3).map(function(k){ return readableTag[k]||k; }).filter(Boolean);
  if (!top.length) return;
  var box = document.getElementById('tag-insights');
  if (box) box.innerHTML = '<div style="background:#FFF8F0;border:1.5px solid #FED7AA;border-radius:12px;padding:14px 16px"><div style="font-size:11px;font-weight:900;letter-spacing:1px;color:#C05621;font-family:\'Montserrat\',sans-serif;margin-bottom:6px">WHAT YOU TEND TO SAVE</div><div style="font-size:13px;color:#4A5568;line-height:1.6">' + top.join(' · ') + '</div></div>';
}, 100);

function removeSaved(slug) {
  var s = JSON.parse(localStorage.getItem('savedActivities') || '[]');
  s = s.filter(function(a){ return a.slug !== slug; });
  localStorage.setItem('savedActivities', JSON.stringify(s));
  location.reload();
}
</script>
</body>
</html>
